    and reusable across projects.
  path: pyspark/
  entry_points:
    index: index.md
    quick_reference: quick-reference.md
  concepts:
    - name: lazy-evaluation-and-actions
      path: concepts/lazy-evaluation-and-actions.md
      confidence: 0.95
    - name: joins-and-strategies
      path: concepts/joins-and-strategies.md
      confidence: 0.95
  patterns:
    - name: reading-writing-files
      path: patterns/reading-writing-files.md
    - name: performance-essentials
      path: patterns/performance-essentials.md
